<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Web del Herbario Universitario</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- Firebase (opcional, no afecta el problema actual) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
</head>

<body>
    <header>
        <div class="hamburger-menu">
            <button id="hamburger-btn">☰</button>
            <div class="menu-dropdown" id="menu-dropdown">
                <a href="#" id="dark-mode-toggle">Modo Oscuro</a>
                <a href="#" id="language-toggle">Idioma</a>
                <a href="#" id="admin-access" style="display:none;">Panel de Control</a>
            </div>
        </div>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="collection.html">Colección</a>
            <a href="workshops.html">Talleres</a>
            <a href="about.html">Acerca del Herbario</a>
            <a href="profile.html">Perfil</a>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="search-bar" placeholder="Buscar muestras...">
            <div id="autocomplete-results"></div>

            <div class="filters" id="filters">
                <button id="toggle-filters">Mostrar Filtros</button>
                <div id="filter-options" style="display:none;">
                    <select id="family-filter">
                        <option value="">Familia</option>
                    </select>
                    <select id="genus-filter">
                        <option value="">Género</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="mosaic" id="mosaic">
            <!-- Mosaico de muestras -->
        </section>
    </main>

    <footer>
        <p>© 2023 Herbario Universitario UDLAP</p>
    </footer>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
